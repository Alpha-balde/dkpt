# ============================================
# DKPT — Pipeline CD Production (GitHub Actions)
# ============================================
# Architecture : Build Once, Deploy Many (BODM)
# Déclenché après le succès du CD Staging (workflow_run sur main).
# Jobs : deploy (pull :sha + SSH deploy) → retag :latest
#
# Même image :sha que celle déployée en staging.
# Aucun docker build ici — l'image vient du CI.
# Le sha est récupéré via github.event.workflow_run.head_sha.
#
# Plateforme : GitHub Actions
# Environnement : Production — https://dkpt.soguimod.com
# Comparaison : voir docs/ci-comparison/github-actions.md
# ============================================

name: DKPT CD — Production

on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'SHA complet du commit à déployer (laisser vide pour le HEAD)'
        required: false
  workflow_run:
    workflows: ["DKPT CD — Staging"]
    types: [completed]
    branches: [main]

env:
  DOCKER_BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/dkpt-backend
  DOCKER_FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/dkpt-frontend

jobs:
  # ============================================
  # Job 1 — Deploy to Production VPS
  # ============================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment: Prod
    outputs:
      short_sha: ${{ steps.sha.outputs.short }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: |
          FULL_SHA="${{ inputs.sha || github.event.workflow_run.head_sha || github.sha }}"
          echo "short=$(echo $FULL_SHA | cut -c1-8)" >> $GITHUB_OUTPUT
          echo "full=$FULL_SHA" >> $GITHUB_OUTPUT

      - name: Prepare deployment directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo mkdir -p /opt/dkpt/caddy /opt/dkpt/docker/seed
            sudo rm -rf /opt/dkpt/nginx
            sudo chown -R $(whoami):$(whoami) /opt/dkpt

      - name: Copy infrastructure files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.prod.yml,caddy/Caddyfile,scripts/,docker/seed/"
          target: "/opt/dkpt"

      - name: Generate .env on VPS (IMAGE_TAG=sha-xxxxx)
        uses: appleboy/ssh-action@v1
        env:
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
          JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          NUXT_PUBLIC_API_BASE: ${{ secrets.NUXT_PUBLIC_API_BASE }}
          SITE_ADDRESS: ${{ secrets.SITE_ADDRESS }}
          IMAGE_TAG: sha-${{ steps.sha.outputs.short }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,JWT_SECRET_KEY,JWT_ISSUER,JWT_AUDIENCE,CORS_ORIGINS,NUXT_PUBLIC_API_BASE,SITE_ADDRESS,IMAGE_TAG
          script: bash /opt/dkpt/scripts/generate-env.sh

      - name: Deploy via SSH (pull :sha + up)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: bash /opt/dkpt/scripts/deploy.sh

  # ============================================
  # Job 2 — Retag :latest (via reusable workflow)
  # ============================================
  # Réutilisabilité GitHub Actions (QR3) :
  # La logique de retag est centralisée dans reusable-retag.yml
  # et appelée ici via workflow_call.
  retag:
    name: Retag :latest
    needs: deploy
    uses: ./.github/workflows/reusable-retag.yml
    with:
      tag: latest
      sha: ${{ needs.deploy.outputs.short_sha }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
