# ============================================
# DKPT — Mirror Repository
# ============================================
# Synchronise le repo GitHub vers les plateformes miroirs :
#   - GitLab (pull mirror natif OU push ici)
#   - Bitbucket
#   - Azure Repos
#
# Déclenché sur chaque push vers main ou develop
# ============================================

name: Mirror Repositories

on:
  push:
    branches: [develop]

jobs:
  # ============================================
  # Job — Mirror to all platforms
  # ============================================
  mirror:
    name: Mirror to CI platforms
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history pour le mirroring

      # ---- GitLab ----
      # Note : GitLab supporte le pull mirror natif (Settings → Repository → Mirroring)
      # Ce step est un fallback si le pull mirror n'est pas configuré
      - name: Mirror to GitLab
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: git@gitlab.com:Alpha-balde/dkpt.git
          ssh_private_key: ${{ secrets.GITLAB_SSH_KEY }}

      # ---- Bitbucket ----
      - name: Mirror to Bitbucket
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: git@bitbucket.org:Alpha-balde/dkpt.git
          ssh_private_key: ${{ secrets.BITBUCKET_SSH_KEY }}

      # ---- Azure Repos ----
      - name: Mirror to Azure Repos
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: git@ssh.dev.azure.com:v3/Alpha-balde/dkpt/dkpt
          ssh_private_key: ${{ secrets.AZURE_REPOS_SSH_KEY }}
