# ============================================
# DKPT — Mirror Repository
# ============================================
# Synchronise le repo GitHub vers les plateformes miroirs :
#   - GitLab   (SSH push — pull mirror natif = Premium uniquement)
#   - Bitbucket (SSH push — pas de pull mirror natif)
#
# Note : Azure DevOps utilise GitHub App (connexion directe, pas de mirror).
#
# Déclenché sur chaque push vers main
# ============================================

name: Mirror Repositories

on:
  workflow_dispatch: 
  push:
    branches: [main]

jobs:
  # ============================================
  # Job — Mirror to all platforms
  # ============================================
  mirror:
    name: Mirror to CI platforms
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history pour le mirroring

      # ---- GitLab ----
      # Pull mirror natif indisponible sur le free tier GitLab
      # Ce step pousse le code depuis GitHub vers GitLab
      - name: Mirror to GitLab
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: git@gitlab.com:Alpha_Balde/dkpt-mirror.git
          ssh_private_key: ${{ secrets.GITLAB_SSH_KEY }}

      # ---- Bitbucket ----
      # Bitbucket ne propose pas de pull mirror natif.
      # Ce step pousse le code depuis GitHub vers Bitbucket via SSH.
      - name: Mirror to Bitbucket
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: git@bitbucket.org:alpha-balde/dkpt-mirror.git
          ssh_private_key: ${{ secrets.BITBUCKET_SSH_KEY }}

      # ---- Azure DevOps ----
      # Pas de mirroring SSH. Azure DevOps se connecte directement au
      # repo GitHub via GitHub App (configuré dans l'UI Azure DevOps).
      # Déclenchement instantané sur push GitHub, aucune clé SSH requise.