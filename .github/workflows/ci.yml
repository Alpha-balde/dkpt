# ============================================
# DKPT — Pipeline CI (Intégration Continue)
# ============================================
# Déclenché sur push/PR vers main
# Job : build-and-test (backend .NET + frontend Nuxt)
# Le déploiement est géré par cd.yml
# ============================================

name: DKPT CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "docs/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "docs/**"

env:
  DOTNET_VERSION: "9.0.x"
  NODE_VERSION: "20"

jobs:
  # ============================================
  # Job — Build & Test
  # ============================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---- Backend (.NET 9) ----
      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore backend dependencies
        run: dotnet restore
        working-directory: backend

      - name: Build backend
        run: dotnet build --no-restore --configuration Release
        working-directory: backend

      - name: Run backend tests
        run: dotnet test --no-build --configuration Release --verbosity minimal
        working-directory: backend

      # ---- Frontend (Nuxt 4) ----
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

