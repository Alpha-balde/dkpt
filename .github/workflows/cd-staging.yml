# ============================================
# DKPT — Pipeline CD Staging (GitHub Actions)
# ============================================
# Déclenché après le succès du workflow CI sur develop
# Jobs : docker (build & push :staging) → deploy (SSH VPS staging)
#
# Plateforme : GitHub Actions
# Environnement : Staging
# Comparaison : voir docs/ci-comparison/github-actions.md
# ============================================

name: DKPT CD — Staging

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["DKPT CI"]
    types: [completed]
    branches: [develop]

env:
  DOCKER_BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/dkpt-backend
  DOCKER_FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/dkpt-frontend

jobs:
  # ============================================
  # Job 1 — Docker Build & Push (tag :staging)
  # ============================================
  docker:
    name: Docker Build & Push (Staging)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---- Backend Image ----
      - name: Build & Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.DOCKER_BACKEND_IMAGE }}:staging
            ${{ env.DOCKER_BACKEND_IMAGE }}:staging-${{ github.event.workflow_run.head_sha || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- Frontend Image ----
      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.DOCKER_FRONTEND_IMAGE }}:staging
            ${{ env.DOCKER_FRONTEND_IMAGE }}:staging-${{ github.event.workflow_run.head_sha || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Job 2 — Deploy to Staging VPS
  # ============================================
  deploy:
    name: Deploy to Staging 
    runs-on: ubuntu-latest
    needs: docker
    environment: Dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare deployment directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_STAGING_HOST }}
          username: ${{ secrets.VPS_STAGING_USER }}
          key: ${{ secrets.VPS_STAGING_SSH_KEY }}
          script: |
            sudo mkdir -p /opt/dkpt/nginx
            sudo chown -R $(whoami):$(whoami) /opt/dkpt

      - name: Copy infrastructure files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_STAGING_HOST }}
          username: ${{ secrets.VPS_STAGING_USER }}
          key: ${{ secrets.VPS_STAGING_SSH_KEY }}
          source: "docker-compose.prod.yml,nginx/nginx.conf,scripts/"
          target: "/opt/dkpt"

      - name: Generate .env on VPS
        uses: appleboy/ssh-action@v1
        env:
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          CONNECTION_STRING: ${{ secrets.CONNECTION_STRING }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
          JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          NUXT_PUBLIC_API_BASE: ${{ secrets.NUXT_PUBLIC_API_BASE }}
        with:
          host: ${{ secrets.VPS_STAGING_HOST }}
          username: ${{ secrets.VPS_STAGING_USER }}
          key: ${{ secrets.VPS_STAGING_SSH_KEY }}
          envs: POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,CONNECTION_STRING,JWT_SECRET_KEY,JWT_ISSUER,JWT_AUDIENCE,CORS_ORIGINS,NUXT_PUBLIC_API_BASE
          script: bash /opt/dkpt/scripts/generate-env.sh

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_STAGING_HOST }}
          username: ${{ secrets.VPS_STAGING_USER }}
          key: ${{ secrets.VPS_STAGING_SSH_KEY }}
          script: bash /opt/dkpt/scripts/deploy.sh
