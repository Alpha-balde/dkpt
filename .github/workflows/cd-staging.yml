# ============================================
# DKPT — Pipeline CD Staging (GitHub Actions)
# ============================================
# Déclenché après le succès du workflow CI sur develop
# Jobs : docker (build & push :staging) → deploy (SSH VPS staging)
#
# Plateforme : GitHub Actions
# Environnement : Staging
# Comparaison : voir docs/ci-comparison/github-actions.md
# ============================================

name: DKPT CD — Staging

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["DKPT CI"]
    types: [completed]
    branches: [develop]

env:
  DOCKER_BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/dkpt-backend
  DOCKER_FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/dkpt-frontend

jobs:
  # ============================================
  # Job 1 — Docker Build & Push (tag :staging)
  # ============================================
  docker:
    name: Docker Build & Push (Staging)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---- Backend Image ----
      - name: Build & Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_BACKEND_IMAGE }}:staging
            ${{ env.DOCKER_BACKEND_IMAGE }}:staging-${{ github.event.workflow_run.head_sha || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- Frontend Image ----
      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_FRONTEND_IMAGE }}:staging
            ${{ env.DOCKER_FRONTEND_IMAGE }}:staging-${{ github.event.workflow_run.head_sha || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Job 2 — Deploy to Staging VPS
  # ============================================
  deploy:
    name: Deploy to Staging 
    runs-on: ubuntu-latest
    needs: docker
    environment: Dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare deployment directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_STAGING_HOST }}
          username: ${{ secrets.VPS_STAGING_USER }}
          key: ${{ secrets.VPS_STAGING_SSH_KEY }}
          script: |
            sudo mkdir -p /opt/dkpt/nginx
            sudo chown -R $(whoami):$(whoami) /opt/dkpt

      - name: Copy infrastructure files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_STAGING_HOST }}
          username: ${{ secrets.VPS_STAGING_USER }}
          key: ${{ secrets.VPS_STAGING_SSH_KEY }}
          source: "docker-compose.prod.yml,nginx/nginx.conf"
          target: "/opt/dkpt"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_STAGING_HOST }}
          username: ${{ secrets.VPS_STAGING_USER }}
          key: ${{ secrets.VPS_STAGING_SSH_KEY }}
          script: |
            cd /opt/dkpt
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
            echo "✅ Staging deploy complete!"
