# ============================================
# DKPT — Pipeline PR Check (GitHub Actions)
# ============================================
# Déclenché sur les Pull Requests vers main ou develop
# Job : vérification rapide (build + test, sans deploy)
#
# Plateforme : GitHub Actions
# Comparaison : voir docs/ci-comparison/github-actions.md
# ============================================

name: DKPT PR Check

on:
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "README.md"
      - "docs/**"

env:
  DOTNET_VERSION: "9.0.x"
  NODE_VERSION: "20"

jobs:
  # ============================================
  # Job 1 — Backend Check
  # ============================================
  check-backend:
    name: "Backend — Build & Test"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore
        working-directory: backend

      - name: Build
        run: dotnet build --no-restore --configuration Release
        working-directory: backend

      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity minimal
        working-directory: backend

  # ============================================
  # Job 2 — Frontend Check
  # ============================================
  check-frontend:
    name: "Frontend — Build"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
