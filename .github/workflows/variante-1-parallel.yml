# ============================================
# DKPT — Variante 1 : Jobs parallèles
# ============================================
# Sépare le build/test backend et frontend en
# deux jobs parallèles pour réduire le temps total.
#
# Comparaison avec ci.yml (référence) :
#   - ci.yml : 1 job séquentiel (backend PUIS frontend)
#   - ici   : 2 jobs parallèles (backend ET frontend en même temps)
# ============================================

name: "Variante 1 — Parallel"

on:
  workflow_dispatch:  # Déclenchement manuel uniquement

env:
  DOTNET_VERSION: "9.0.x"
  NODE_VERSION: "20"

jobs:
  # ============================================
  # Job 1a — Backend (en parallèle avec frontend)
  # ============================================
  test-backend:
    name: "Backend — Build & Test"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore
        working-directory: backend

      - name: Build
        run: dotnet build --no-restore --configuration Release
        working-directory: backend

      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity minimal
        working-directory: backend

  # ============================================
  # Job 1b — Frontend (en parallèle avec backend)
  # ============================================
  test-frontend:
    name: "Frontend — Build & Test"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
