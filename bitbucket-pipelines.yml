# ============================================
# DKPT — Bitbucket Pipelines
# ============================================
# Contrainte Bitbucket : un seul fichier à la racine.
# Tout est organisé en sections (branches, pull-requests, custom).
#
# Bitbucket ne supporte PAS les pipelines séparés comme
# GitHub Actions ou Azure DevOps. On utilise des sections
# pour simuler le même comportement.
#
# Équivalent de :
#   - .github/workflows/ci.yml
#   - .github/workflows/cd-staging.yml
#   - .github/workflows/cd-prod.yml
#   - .github/workflows/pr-check.yml
#
# Comparaison : voir docs/ci-comparison/bitbucket.md
# ============================================

image: atlassian/default-image:4

definitions:
  # ============================================
  # Steps réutilisables (YAML anchors)
  # ============================================
  steps:
    - step: &build-test-backend
        name: 'Backend — Build & Test'
        image: mcr.microsoft.com/dotnet/sdk:9.0
        caches:
          - dotnetcore
        script:
          - cd backend
          - dotnet restore
          - dotnet build --no-restore --configuration Release
          - dotnet test --no-build --configuration Release --verbosity minimal

    - step: &build-frontend
        name: 'Frontend — Build'
        image: node:20-alpine
        caches:
          - node
        script:
          - cd frontend
          - npm ci
          - npm run build

    - step: &docker-build-push-staging
        name: 'Docker Build & Push (Staging)'
        image: atlassian/default-image:4
        services:
          - docker
        script:
          - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
          # Backend
          - docker build -t $DOCKERHUB_USERNAME/dkpt-backend:staging ./backend
          - docker push $DOCKERHUB_USERNAME/dkpt-backend:staging
          # Frontend
          - docker build -t $DOCKERHUB_USERNAME/dkpt-frontend:staging ./frontend
          - docker push $DOCKERHUB_USERNAME/dkpt-frontend:staging

    - step: &docker-build-push-prod
        name: 'Docker Build & Push (Production)'
        image: atlassian/default-image:4
        services:
          - docker
        script:
          - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
          # Backend
          - docker build -t $DOCKERHUB_USERNAME/dkpt-backend:latest ./backend
          - docker push $DOCKERHUB_USERNAME/dkpt-backend:latest
          # Frontend
          - docker build -t $DOCKERHUB_USERNAME/dkpt-frontend:latest ./frontend
          - docker push $DOCKERHUB_USERNAME/dkpt-frontend:latest

    - step: &deploy-staging
        name: 'Deploy to Staging'
        deployment: staging
        script:
          # Préparer le dossier de déploiement
          - pipe: atlassian/ssh-run:0.8.1
            variables:
              SSH_USER: $VPS_STAGING_USER
              SERVER: $VPS_STAGING_HOST
              SSH_KEY: $VPS_STAGING_SSH_KEY
              COMMAND: 'sudo mkdir -p /opt/dkpt/caddy /opt/dkpt/docker/seed && sudo rm -rf /opt/dkpt/nginx && sudo chown -R $(whoami):$(whoami) /opt/dkpt'
          # Copier les fichiers d'infrastructure sur le VPS
          - pipe: atlassian/scp-deploy:1.4.0
            variables:
              USER: $VPS_STAGING_USER
              SERVER: $VPS_STAGING_HOST
              REMOTE_PATH: '/opt/dkpt'
              LOCAL_PATH: 'docker-compose.prod.yml'
              SSH_KEY: $VPS_STAGING_SSH_KEY
          - pipe: atlassian/scp-deploy:1.4.0
            variables:
              USER: $VPS_STAGING_USER
              SERVER: $VPS_STAGING_HOST
              REMOTE_PATH: '/opt/dkpt/caddy'
              LOCAL_PATH: 'caddy/*'
              SSH_KEY: $VPS_STAGING_SSH_KEY
          - pipe: atlassian/scp-deploy:1.4.0
            variables:
              USER: $VPS_STAGING_USER
              SERVER: $VPS_STAGING_HOST
              REMOTE_PATH: '/opt/dkpt/docker/seed'
              LOCAL_PATH: 'docker/seed/*'
              SSH_KEY: $VPS_STAGING_SSH_KEY
          # Déployer
          - pipe: atlassian/ssh-run:0.8.1
            variables:
              SSH_USER: $VPS_STAGING_USER
              SERVER: $VPS_STAGING_HOST
              SSH_KEY: $VPS_STAGING_SSH_KEY
              COMMAND: >
                cd /opt/dkpt &&
                docker compose -f docker-compose.prod.yml pull &&
                docker compose -f docker-compose.prod.yml up -d --remove-orphans &&
                echo "🌱 Running database seed (idempotent)..." &&
                docker compose -f docker-compose.prod.yml --profile seed up seed &&
                docker image prune -f &&
                echo "✅ Staging deploy complete!"

    - step: &deploy-prod
        name: 'Deploy to Production'
        deployment: production
        trigger: manual  # Approbation manuelle pour la production
        script:
          # Préparer le dossier de déploiement
          - pipe: atlassian/ssh-run:0.8.1
            variables:
              SSH_USER: $VPS_USER
              SERVER: $VPS_HOST
              SSH_KEY: $VPS_SSH_KEY
              COMMAND: 'sudo mkdir -p /opt/dkpt/caddy /opt/dkpt/docker/seed && sudo rm -rf /opt/dkpt/nginx && sudo chown -R $(whoami):$(whoami) /opt/dkpt'
          # Copier les fichiers d'infrastructure sur le VPS
          - pipe: atlassian/scp-deploy:1.4.0
            variables:
              USER: $VPS_USER
              SERVER: $VPS_HOST
              REMOTE_PATH: '/opt/dkpt'
              LOCAL_PATH: 'docker-compose.prod.yml'
              SSH_KEY: $VPS_SSH_KEY
          - pipe: atlassian/scp-deploy:1.4.0
            variables:
              USER: $VPS_USER
              SERVER: $VPS_HOST
              REMOTE_PATH: '/opt/dkpt/caddy'
              LOCAL_PATH: 'caddy/*'
              SSH_KEY: $VPS_SSH_KEY
          - pipe: atlassian/scp-deploy:1.4.0
            variables:
              USER: $VPS_USER
              SERVER: $VPS_HOST
              REMOTE_PATH: '/opt/dkpt/docker/seed'
              LOCAL_PATH: 'docker/seed/*'
              SSH_KEY: $VPS_SSH_KEY
          # Déployer
          - pipe: atlassian/ssh-run:0.8.1
            variables:
              SSH_USER: $VPS_USER
              SERVER: $VPS_HOST
              SSH_KEY: $VPS_SSH_KEY
              COMMAND: >
                cd /opt/dkpt &&
                docker compose -f docker-compose.prod.yml pull &&
                docker compose -f docker-compose.prod.yml up -d --remove-orphans &&
                echo "🌱 Running database seed (idempotent)..." &&
                docker compose -f docker-compose.prod.yml --profile seed up seed &&
                docker image prune -f &&
                echo "✅ Production deploy complete!"

  services:
    docker:
      memory: 2048

  caches:
    dotnetcore: backend/**/obj

pipelines:
  # ============================================
  # CI — Toutes les branches (build & test)
  # ============================================
pipelines:
  default:
    - step:
        <<: *build-test-backend
        runs-on:
          - self.hosted
          - linux
    - step:
        <<: *build-frontend
        runs-on:
          - self.hosted
          - linux

  # ============================================
  # CD — Par branche
  # ============================================
  # branches:
  #   # ---- Staging (develop) ----
  #   develop:
  #     - step: *build-test-backend
  #     - step: *build-frontend
  #     - step: *docker-build-push-staging
  #     - step: *deploy-staging

  #   # ---- Production (main) ----
  #   main:
  #     - step: *build-test-backend
  #     - step: *build-frontend
  #     - step: *docker-build-push-prod
  #     - step: *deploy-prod

  # # ============================================ 
  # # PR Check — Vérification des Pull Requests
  # # ============================================
  # pull-requests:
  #   '**':
  #     - step: *build-test-backend
  #     - step: *build-frontend
