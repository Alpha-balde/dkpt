# ============================================
# DKPT — Bitbucket Pipelines
# ============================================
# Architecture : Build Once, Deploy Many (BODM)
#
# Contrainte Bitbucket : un seul fichier à la racine.
# Pas de chaînage inter-pipelines — tout est dans branches: main:
#
# Sélecteur de plateforme : les steps du pipeline main ne s'exécutent
# que si le message de commit contient [ci:bitbucket].
# Exemples :
#   git commit -m "fix: auth [ci:bitbucket]"
#   git commit -m "release: v1.2 [ci:bitbucket]"
# Runner CI : Bitbucket cloud runners (hosted) — image Docker spécifiée par step
# Runner Docker/CD : VPS self-hosted ARM64 (runs-on: [self.hosted, linux])
# Configuration équitable Hybrid Optimal (Échantillon 3)
# Flux BODM dans branches: main:
#   CI (build+test) → Docker build :sha → Deploy staging → Retag :staging
#                                       → Deploy prod (manual) → Retag :latest
#
# Équivalent de :
#   - .github/workflows/ci.yml          → default: + étapes 1-2 de branches: main:
#   - .github/workflows/cd-staging.yml  → étapes 3-4 de branches: main:
#   - .github/workflows/cd-prod.yml     → étape 5 de branches: main:
#   - .github/workflows/pr-check.yml    → pull-requests:
#
# Comparaison : voir docs/ci-comparison/bitbucket.md
# ============================================

image: atlassian/default-image:5

definitions:
  # ============================================
  # Steps réutilisables (YAML anchors)
  # ============================================
  steps:
    # ---- Step : Backend Build & Test ----
    - step: &build-test-backend
        name: 'Backend — Build & Test'
        image: mcr.microsoft.com/dotnet/sdk:9.0
        runs-on:
          - self.hosted
          - linux
        # Self-hosted ARM64 VPS — Échantillon B (Full Self-Hosted)
        caches:
          - dotnetcore
        script:
          - 'git log -1 --pretty=%B | grep -q "ci:bitbucket" || { echo "⏩ [ci:bitbucket] absent — step ignoré"; exit 0; }'
          - cd backend
          - dotnet restore
          - dotnet build --no-restore --configuration Release
          - dotnet test --no-build --configuration Release --verbosity minimal

    # ---- Step : Frontend Lint & Build ----
    # Node.js 22 requis (Object.groupBy — incompatible Node 20)
    - step: &build-frontend
        name: 'Frontend — Lint & Build'
        image: node:22-alpine
        runs-on:
          - self.hosted
          - linux
        # Self-hosted ARM64 VPS — Échantillon B (Full Self-Hosted)
        caches:
          - node
        script:
          - apk add --no-cache git
          - 'git log -1 --pretty=%B | grep -q "ci:bitbucket" || { echo "⏩ [ci:bitbucket] absent — step ignoré"; exit 0; }'
          - cd frontend
          - npm ci
          - npm run lint
          - npm run build

    # ---- Step : Docker Build & Push (:sha-xxxxx) ----
    # BUILD ONCE — image construite une seule fois, réutilisée pour staging + prod
    - step: &docker-build-sha
        name: 'Docker — Build & Push :sha-{8chars}'
        image: atlassian/default-image:5
        runs-on:
          - self.hosted
          - linux
        services:
          - docker
        script:
          - 'git log -1 --pretty=%B | grep -q "ci:bitbucket" || { echo "[ci:bitbucket] absent — step ignoré"; exit 0; }'
          - SHORT_SHA=$(echo $BITBUCKET_COMMIT | cut -c1-8)
          - echo "Building images with tag sha-$SHORT_SHA"
          - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
          - docker build -t $DOCKERHUB_USERNAME/dkpt-backend:sha-$SHORT_SHA ./backend
          - docker push $DOCKERHUB_USERNAME/dkpt-backend:sha-$SHORT_SHA
          - docker build -t $DOCKERHUB_USERNAME/dkpt-frontend:sha-$SHORT_SHA ./frontend
          - docker push $DOCKERHUB_USERNAME/dkpt-frontend:sha-$SHORT_SHA
          - 'echo "Images pushed: sha-$SHORT_SHA"'

    # ---- Step : Deploy Staging + Retag :staging ----
    # DEPLOY 1 — pull l'image :sha déjà sur Docker Hub, déploie, retag :staging
    - step: &deploy-staging
        name: 'Deploy to Staging + Retag :staging'
        deployment: Staging
        runs-on:
          - self.hosted
          - linux
        services:
          - docker
        script:
          - 'git log -1 --pretty=%B | grep -q "ci:bitbucket" || { echo "[ci:bitbucket] absent — déploiement ignoré"; exit 0; }'
          - SHORT_SHA=$(echo $BITBUCKET_COMMIT | cut -c1-8)
          # SSH chargé automatiquement via Bitbucket SSH Keys (Repository Settings)
          # Prepare VPS directory
          - ssh $VPS_STAGING_USER@$VPS_STAGING_HOST "sudo mkdir -p /opt/dkpt/caddy /opt/dkpt/docker/seed && sudo rm -rf /opt/dkpt/nginx && sudo chown -R \$(whoami):\$(whoami) /opt/dkpt"
          # Copy infrastructure files
          - scp docker-compose.prod.yml $VPS_STAGING_USER@$VPS_STAGING_HOST:/opt/dkpt/
          - scp -r caddy/ $VPS_STAGING_USER@$VPS_STAGING_HOST:/opt/dkpt/
          - scp -r docker/ $VPS_STAGING_USER@$VPS_STAGING_HOST:/opt/dkpt/
          - scp -r scripts/ $VPS_STAGING_USER@$VPS_STAGING_HOST:/opt/dkpt/
          # Generate .env with IMAGE_TAG=sha-$SHORT_SHA
          - ssh $VPS_STAGING_USER@$VPS_STAGING_HOST "POSTGRES_DB='$POSTGRES_DB' POSTGRES_USER='$POSTGRES_USER' POSTGRES_PASSWORD='$POSTGRES_PASSWORD' JWT_SECRET_KEY='$JWT_SECRET_KEY' JWT_ISSUER='$JWT_ISSUER' JWT_AUDIENCE='$JWT_AUDIENCE' CORS_ORIGINS='$CORS_ORIGINS' NUXT_PUBLIC_API_BASE='$NUXT_PUBLIC_API_BASE' SITE_ADDRESS='$SITE_ADDRESS' APPLICATIONINSIGHTS_CONNECTION_STRING='$APPLICATIONINSIGHTS_CONNECTION_STRING' IMAGE_TAG=sha-$SHORT_SHA bash /opt/dkpt/scripts/generate-env.sh"
          # Deploy
          - ssh $VPS_STAGING_USER@$VPS_STAGING_HOST "bash /opt/dkpt/scripts/deploy.sh"
          # BODM — Retag :staging
          - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
          - docker pull $DOCKERHUB_USERNAME/dkpt-backend:sha-$SHORT_SHA
          - docker tag $DOCKERHUB_USERNAME/dkpt-backend:sha-$SHORT_SHA $DOCKERHUB_USERNAME/dkpt-backend:staging
          - docker push $DOCKERHUB_USERNAME/dkpt-backend:staging
          - docker pull $DOCKERHUB_USERNAME/dkpt-frontend:sha-$SHORT_SHA
          - docker tag $DOCKERHUB_USERNAME/dkpt-frontend:sha-$SHORT_SHA $DOCKERHUB_USERNAME/dkpt-frontend:staging
          - docker push $DOCKERHUB_USERNAME/dkpt-frontend:staging
          - 'echo "Staging deployed: sha-$SHORT_SHA promoted to staging"'

    # ---- Step : Deploy Production + Retag :latest ----
    # DEPLOY 2 — même image :sha que staging, déploie en prod, retag :latest
    - step: &deploy-prod
        name: 'Deploy to Production + Retag :latest'
        deployment: Prod
        trigger: manual
        runs-on:
          - self.hosted
          - linux
        services:
          - docker
        script:
          - 'git log -1 --pretty=%B | grep -q "ci:bitbucket" || { echo "[ci:bitbucket] absent — déploiement ignoré"; exit 0; }'
          - SHORT_SHA=$(echo $BITBUCKET_COMMIT | cut -c1-8)
          # SSH chargé automatiquement via Bitbucket SSH Keys (Repository Settings)
          # Prepare VPS directory
          - ssh $VPS_USER@$VPS_HOST "sudo mkdir -p /opt/dkpt/caddy /opt/dkpt/docker/seed && sudo rm -rf /opt/dkpt/nginx && sudo chown -R \$(whoami):\$(whoami) /opt/dkpt"
          # Copy infrastructure files
          - scp docker-compose.prod.yml $VPS_USER@$VPS_HOST:/opt/dkpt/
          - scp -r caddy/ $VPS_USER@$VPS_HOST:/opt/dkpt/
          - scp -r docker/ $VPS_USER@$VPS_HOST:/opt/dkpt/
          - scp -r scripts/ $VPS_USER@$VPS_HOST:/opt/dkpt/
          # Generate .env with IMAGE_TAG=sha-$SHORT_SHA (même image que staging)
          - ssh $VPS_USER@$VPS_HOST "POSTGRES_DB='$POSTGRES_DB' POSTGRES_USER='$POSTGRES_USER' POSTGRES_PASSWORD='$POSTGRES_PASSWORD' JWT_SECRET_KEY='$JWT_SECRET_KEY' JWT_ISSUER='$JWT_ISSUER' JWT_AUDIENCE='$JWT_AUDIENCE' CORS_ORIGINS='$CORS_ORIGINS' NUXT_PUBLIC_API_BASE='$NUXT_PUBLIC_API_BASE' SITE_ADDRESS='$SITE_ADDRESS' APPLICATIONINSIGHTS_CONNECTION_STRING='$APPLICATIONINSIGHTS_CONNECTION_STRING' IMAGE_TAG=sha-$SHORT_SHA bash /opt/dkpt/scripts/generate-env.sh"
          # Deploy
          - ssh $VPS_USER@$VPS_HOST "bash /opt/dkpt/scripts/deploy.sh"
          # BODM — Retag :latest
          - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
          - docker pull $DOCKERHUB_USERNAME/dkpt-backend:sha-$SHORT_SHA
          - docker tag $DOCKERHUB_USERNAME/dkpt-backend:sha-$SHORT_SHA $DOCKERHUB_USERNAME/dkpt-backend:latest
          - docker push $DOCKERHUB_USERNAME/dkpt-backend:latest
          - docker pull $DOCKERHUB_USERNAME/dkpt-frontend:sha-$SHORT_SHA
          - docker tag $DOCKERHUB_USERNAME/dkpt-frontend:sha-$SHORT_SHA $DOCKERHUB_USERNAME/dkpt-frontend:latest
          - docker push $DOCKERHUB_USERNAME/dkpt-frontend:latest
          - 'echo "Production deployed: sha-$SHORT_SHA promoted to latest"'

  services:
    docker:
      memory: 3072

  caches:
    dotnetcore: backend/**/obj

# ============================================
# Pipelines
# ============================================
pipelines:

  # ============================================
  # CI — Feature branches (build & test uniquement)
  # ============================================
  default:
    - step: *build-test-backend
    - step: *build-frontend

  # ============================================
  # branches: main — Pipeline BODM complet
  # ============================================
  # Flux : CI → Docker build :sha → Deploy staging → Deploy prod (manual)
  # Une seule image construite, promue de staging vers production.
  # Note : Bitbucket ne supporte pas le chaînage inter-pipelines.
  #        CI et CD cohabitent dans ce même bloc (différence vs GitHub/GitLab/Azure).
  # ============================================
  branches:
    main:
      - step: *build-test-backend
      - step: *build-frontend
      - step: *docker-build-sha
      - step: *deploy-staging
      - step: *deploy-prod

  # ============================================
  # PR Check — Vérification des Pull Requests
  # ============================================
  pull-requests:
    '**':
      - step: *build-test-backend
      - step: *build-frontend
