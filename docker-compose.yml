# ============================================
# DKPT — Docker Compose
# ============================================
# Usage:
#   docker compose --profile seed up --build -d  → Build + seed automatique (1er lancement)
#   docker compose up -d                         → Lancement normal (données persistées)
#   docker compose logs seed                     → Voir les logs du seed
#   docker compose logs -f                       → Voir les logs de tous les services
#   docker compose down                          → Arrêter
#   docker compose down -v                       → Arrêter + supprimer les volumes

services:
  # ---- PostgreSQL 16 ----
  db:
    image: postgres:16-alpine
    container_name: dkpt-db-compose
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - dkpt-pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # 5433 on host to avoid conflict with standalone dkpt-db
    networks:
      - dkpt-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---- Backend .NET 9 API ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dkpt-backend
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection}
      Jwt__SecretKey: ${Jwt__SecretKey}
      Jwt__Issuer: ${Jwt__Issuer}
      Jwt__Audience: ${Jwt__Audience}
      Cors__Origins: ${Cors__Origins}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dkpt-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    restart: unless-stopped

  # ---- Frontend Nuxt 4 SSR ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dkpt-frontend
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE}
      NUXT_API_BASE_INTERNAL: ${NUXT_API_BASE_INTERNAL}
    depends_on:
      - backend
    networks:
      - dkpt-net
    restart: unless-stopped

  # ---- Nginx Reverse Proxy ----
  nginx:
    image: nginx:alpine
    container_name: dkpt-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - dkpt-net
    restart: unless-stopped

  # ---- Seed Data (one-shot, profil optionnel) ----
  seed:
    image: postgres:16-alpine
    container_name: dkpt-seed
    profiles: [seed]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./docker/seed:/seed:ro
      - ../docs/dkpt_sql:/data:ro
    depends_on:
      backend:
        condition: service_healthy
    entrypoint: ["sh", "/seed/run-seed.sh"]
    networks:
      - dkpt-net
    restart: "no"

volumes:
  dkpt-pgdata:
    name: dkpt-pgdata

networks:
  dkpt-net:
    name: dkpt-net
    driver: bridge
