# ============================================
# DKPT — Nginx Reverse Proxy Configuration
# ============================================

upstream frontend_upstream {
    server frontend:3000;
}

upstream backend_upstream {
    server backend:8080;
}

server {
    listen 80;
    server_name localhost;

    # ---- API Backend (.NET 9) ----
    location /api/ {
        proxy_pass         http://backend_upstream/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts for long API calls
        proxy_connect_timeout 30s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # ---- Swagger UI ----
    location /swagger {
        proxy_pass         http://backend_upstream/swagger;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Redirect /api/swagger → /swagger for convenience
    location /api/swagger {
        return 301 /swagger/index.html;
    }

    # ---- Frontend Nuxt SSR ----
    location / {
        proxy_pass         http://frontend_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (Nuxt HMR in dev, but useful for SSR too)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
