# ============================================
# DKPT — Azure DevOps : Pipeline CI
# ============================================
# Build & Test du backend (.NET 9) et du frontend (Nuxt 4)
# puis Docker build & push (tag sha) sur agent ARM64
# Déclenché sur push vers main
#
# Runner CI : Hosted ubuntu-22.04 (fixé pour reproductibilité)
# Runner Docker/CD : Default pool (DKPT-ARM64, self-hosted VPS)
# Configuration équitable Hybrid Optimal (Échantillon A)
#
# Note : Ce fichier doit être enregistré manuellement dans l'UI
# Azure DevOps comme un pipeline distinct.
#
# Équivalent de : .github/workflows/ci.yml
# Comparaison : voir docs/ci-comparison/azure-devops.md
# ============================================

trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - README.md
      - docs/**

variables:
  - group: dkpt-secrets
  - name: dotnetVersion
    value: '9.0.x'
  - name: nodeVersion
    value: '22'  # Node 22 — cohérent avec GitLab (node:22-alpine), Bitbucket (node:22-alpine), GitHub (NODE_VERSION: 22)
  - name: dockerBackendImage
    value: '$(DOCKERHUB_USERNAME)/dkpt-backend'
  - name: dockerFrontendImage
    value: '$(DOCKERHUB_USERNAME)/dkpt-frontend'

stages:
  # ============================================
  # Stage 1 — Build & Test
  # ============================================
  - stage: BuildTest
    displayName: 'Build & Test'
    pool:
      vmImage: ubuntu-22.04  # Fixé pour reproductibilité (ubuntu-latest peut basculer 22.04→24.04)
    jobs:
      # ---- Backend (.NET 9) ----
      - job: BackendTest
        displayName: 'Backend — Build & Test'
        steps:
          - checkout: self

          - template: templates/build-dotnet.yml

      # ---- Frontend (Nuxt 4) ----
      - job: FrontendBuild
        displayName: 'Frontend — Build'
        steps:
          - template: templates/build-nuxt.yml

  # ============================================
  # Stage 2 — Docker Build & Push
  # ============================================
  - stage: Docker
    displayName: 'Docker Build & Push'
    dependsOn: BuildTest
    pool: Default  # Agent self-hosted ARM64
    jobs:
      - job: BuildPush
        displayName: 'Build & Push Images'
        steps:
          - template: templates/build-docker.yml
