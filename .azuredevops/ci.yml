# ============================================
# DKPT — Azure DevOps : Pipeline CI
# ============================================
# Build & Test du backend (.NET 9) et du frontend (Nuxt 4)
# puis Docker build & push (tag sha) sur agent ARM64
# Déclenché sur push vers main
#
# Runner CI : Hosted ubuntu-22.04 (fixé pour reproductibilité)
# Runner Docker/CD : Default pool (DKPT-ARM64, self-hosted VPS)
# Configuration équitable Hybrid Optimal (Échantillon 3)
#
# Note : Ce fichier doit être enregistré manuellement dans l'UI
# Azure DevOps comme un pipeline distinct.
#
# Équivalent de : .github/workflows/ci.yml
# Comparaison : voir docs/ci-comparison/azure-devops.md
# ============================================

trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - README.md
      - docs/**

variables:
  - group: dkpt-secrets
  - name: dotnetVersion
    value: '9.0.x'
  - name: nodeVersion
    value: '20'
  - name: dockerBackendImage
    value: '$(DOCKERHUB_USERNAME)/dkpt-backend'
  - name: dockerFrontendImage
    value: '$(DOCKERHUB_USERNAME)/dkpt-frontend'

stages:
  # ============================================
  # Stage 1 — Build & Test
  # ============================================
  - stage: BuildTest
    displayName: 'Build & Test'
    pool:
      vmImage: ubuntu-22.04  # Fixé pour reproductibilité (ubuntu-latest peut basculer 22.04→24.04)
    jobs:
      # ---- Backend (.NET 9) ----
      - job: BackendTest
        displayName: 'Backend — Build, Test & SonarCloud'
        steps:
          - checkout: self
            fetchDepth: 0  # NE PAS LIMITER la profondeur de clonage

          - script: mkdir -p $(Pipeline.Workspace)/.sonar/cache
            displayName: 'Create SonarCloud cache directory'

          - task: Cache@2
            displayName: 'Cache SonarCloud'
            inputs:
              key: 'sonar | "$(Agent.OS)"'
              path: '$(Pipeline.Workspace)/.sonar/cache'

          - task: SonarCloudPrepare@3
            displayName: 'SonarCloud — Prepare'
            inputs:
              SonarCloud: 'sonarcloud-connection'
              organization: '$(SONAR_ORGANIZATION)'
              scannerMode: 'dotnet'
              projectKey: '$(SONAR_PROJECT_KEY)'
              projectName: 'DKPT'
              extraProperties: |
                sonar.userHome=$(Pipeline.Workspace)/.sonar

          - template: templates/build-dotnet.yml

          - task: SonarCloudAnalyze@3
            displayName: 'SonarCloud — Analyze'

          - task: SonarCloudPublish@3
            displayName: 'SonarCloud — Publish Quality Gate'
            inputs:
              pollingTimeoutSec: '300'
            continueOnError: true  # 403 en cours de résolution — résultats visibles sur sonarcloud.io

      # ---- Frontend (Nuxt 4) ----
      - job: FrontendBuild
        displayName: 'Frontend — Build'
        steps:
          - template: templates/build-nuxt.yml

  # ============================================
  # Stage 2 — Docker Build & Push
  # ============================================
  - stage: Docker
    displayName: 'Docker Build & Push'
    dependsOn: BuildTest
    pool: Default  # Agent self-hosted ARM64
    jobs:
      - job: BuildPush
        displayName: 'Build & Push Images'
        steps:
          - template: templates/build-docker.yml
