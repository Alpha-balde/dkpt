# ============================================
# DKPT — Azure DevOps : Pipeline CD Staging
# ============================================
# Deploy sur VPS staging + Quality Gate
# Déclenché après succès du pipeline CI sur main
#
# Architecture (Build Once, Deploy Many) :
#   Les images Docker sont buildées dans le pipeline CI.
#   Ce pipeline ne fait que déployer et re-tagger.
#
# Équivalent de : .github/workflows/cd-staging.yml
# ============================================

trigger: none

resources:
  pipelines:
    - pipeline: ci
      source: 'DKPT CI'
      trigger:
        branches:
          include:
            - main

variables:
  - group: dkpt-secrets
  - group: dkpt-staging
  - name: dockerBackendImage
    value: '$(DOCKERHUB_USERNAME)/dkpt-backend'
  - name: dockerFrontendImage
    value: '$(DOCKERHUB_USERNAME)/dkpt-frontend'

stages:
  # ============================================
  # Stage 1 — Deploy to Staging VPS
  # ============================================
  - stage: DeployStaging
    displayName: 'Deploy to Staging'
    jobs:
      - deployment: DeployVPS
        displayName: 'Deploy to Staging VPS'
        environment:
          name: 'Staging'
          resourceType: VirtualMachine
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - template: templates/deploy-vps.yml
                  parameters:
                    envTag: 'staging'

  # ============================================
  # Stage 2 — Quality Gate (post-deploy)
  # ============================================
  - stage: QualityGate
    displayName: 'Quality Gate'
    dependsOn: DeployStaging
    jobs:
      - deployment: PostDeployTests
        displayName: 'Post-Deploy Tests'
        environment:
          name: 'Staging'
          resourceType: VirtualMachine
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - template: templates/quality-gate.yml
