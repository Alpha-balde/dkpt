# ============================================
# DKPT — Azure DevOps : Pipeline CD Staging
# ============================================
# Docker build & push (tag :staging) + deploy sur VPS staging
# Déclenché après succès du pipeline CI sur develop
#
# Architecture :
#   Stage 1 (Docker) : Agent self-hosted DKPT-ARM64 (pool Default)
#                      → Build natif ARM64 + push Docker Hub
#   Stage 2 (Deploy) : Agent d'environnement Staging (sur le VPS)
#                      → Déploiement local (pas de SSH)
#
# Équivalent de : .github/workflows/cd-staging.yml
# ============================================

trigger: none  # Pas de trigger direct, déclenché par pipeline resource

resources:
  pipelines:
    - pipeline: ci
      source: 'DKPT CI'  # Nom du pipeline CI enregistré dans l'UI
      trigger:
        branches:
          include:
            - main

variables:
  - group: dkpt-secrets   # Variables communes (DOCKERHUB_USERNAME, POSTGRES_DB, etc.)
  - group: dkpt-staging   # Variables spécifiques staging (POSTGRES_PASSWORD, JWT_SECRET_KEY, etc.)
  - name: dockerBackendImage
    value: '$(DOCKERHUB_USERNAME)/dkpt-backend'
  - name: dockerFrontendImage
    value: '$(DOCKERHUB_USERNAME)/dkpt-frontend'

stages:
  # ============================================
  # Stage 1 — Docker Build & Push (tag :staging)
  # ============================================
  - stage: Docker
    displayName: 'Docker Build & Push (Staging)'
    pool: Default  # Agent self-hosted DKPT-ARM64 (ARM64 natif)
    jobs:
      - job: BuildPush
        displayName: 'Build & Push Images'
        steps:
          - checkout: self

          - task: Docker@2
            displayName: 'Login to Docker Hub'
            inputs:
              containerRegistry: 'dockerhub-connection'
              command: 'login'

          # ---- Backend Image ----
          - script: |
              docker build -t $(dockerBackendImage):staging -t $(dockerBackendImage):staging-$(Build.SourceVersion) ./backend
              docker push $(dockerBackendImage):staging
              docker push $(dockerBackendImage):staging-$(Build.SourceVersion)
            displayName: 'Build & Push Backend'

          # ---- Frontend Image ----
          - script: |
              docker build -t $(dockerFrontendImage):staging -t $(dockerFrontendImage):staging-$(Build.SourceVersion) ./frontend
              docker push $(dockerFrontendImage):staging
              docker push $(dockerFrontendImage):staging-$(Build.SourceVersion)
            displayName: 'Build & Push Frontend'

  # ============================================
  # Stage 2 — Deploy to Staging VPS
  # ============================================
  - stage: DeployStaging
    displayName: 'Deploy to Staging'
    dependsOn: Docker
    jobs:
      - deployment: DeployVPS
        displayName: 'Deploy to Staging VPS'
        environment:
          name: 'Staging'
          resourceType: VirtualMachine  # Exécuter sur l'agent VM du VPS
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - template: templates/deploy-vps.yml

  # ============================================
  # Stage 3 — Quality Gate (post-deploy)
  # ============================================
  - stage: QualityGate
    displayName: 'Quality Gate'
    dependsOn: DeployStaging
    jobs:
      - deployment: PostDeployTests
        displayName: 'Post-Deploy Tests'
        environment:
          name: 'Staging'
          resourceType: VirtualMachine
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - template: templates/quality-gate.yml
