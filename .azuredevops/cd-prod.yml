# ============================================
# DKPT — Azure DevOps : Pipeline CD Production
# ============================================
# Deploy sur VPS production
# Déclenché après succès du pipeline CD Staging sur main
#
# Architecture (Build Once, Deploy Many) :
#   Les images Docker sont buildées dans le pipeline CI.
#   Ce pipeline ne fait que déployer et re-tagger.
#   L'image déployée est exactement celle validée en staging.
#
# Équivalent de : .github/workflows/cd-prod.yml
# ============================================

trigger: none

resources:
  pipelines:
    - pipeline: staging
      source: 'cd-staging'
      trigger:
        branches:
          include:
            - main

variables:
  - group: dkpt-secrets
  - group: dkpt-prod
  - name: dockerBackendImage
    value: '$(DOCKERHUB_USERNAME)/dkpt-backend'
  - name: dockerFrontendImage
    value: '$(DOCKERHUB_USERNAME)/dkpt-frontend'

stages:
  # ============================================
  # Stage — Deploy to Production VPS
  # ============================================
  - stage: DeployProd
    displayName: 'Deploy to Production'
    jobs:
      - deployment: DeployVPS
        displayName: 'Deploy to Production VPS'
        environment:
          name: 'Prod'
          resourceType: VirtualMachine
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - template: templates/deploy-vps.yml
                  parameters:
                    envTag: 'latest'
