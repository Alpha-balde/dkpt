# ============================================
# DKPT — Azure DevOps : Template Deploy VPS
# ============================================
# Template réutilisable pour le déploiement sur VPS.
# Exécuté par l'agent d'environnement directement sur le VPS
# (pas de SSH — tout est local).
#
# Réutilise les mêmes scripts que GitHub Actions :
#   - scripts/generate-env.sh → Génère le .env
#   - scripts/deploy.sh       → Pull images + docker compose up
#
# Utilisé par : cd-staging.yml, cd-prod.yml
# ============================================

steps:
  - script: |
      echo "=== Debug: Workspace paths ==="
      echo "Build.SourcesDirectory = $(Build.SourcesDirectory)"
      echo "System.DefaultWorkingDirectory = $(System.DefaultWorkingDirectory)"
      echo "Pipeline.Workspace = $(Pipeline.Workspace)"
      ls -la $(System.DefaultWorkingDirectory)/ || echo "DefaultWorkingDirectory not found"
      ls -la $(Pipeline.Workspace)/s/ || echo "Pipeline.Workspace/s not found"
    displayName: 'Debug: Show workspace paths'

  - script: |
      SOURCES="$(System.DefaultWorkingDirectory)"
      # Fallback si DefaultWorkingDirectory ne contient pas le code
      if [ ! -f "$SOURCES/docker-compose.prod.yml" ]; then
        SOURCES="$(Pipeline.Workspace)/s"
      fi
      echo "Using source path: $SOURCES"
      sudo mkdir -p /opt/dkpt/nginx /opt/dkpt/docker/seed /opt/dkpt/scripts
      sudo chown -R $(whoami):$(whoami) /opt/dkpt
      cp "$SOURCES/docker-compose.prod.yml" /opt/dkpt/
      cp "$SOURCES/nginx/nginx.conf" /opt/dkpt/nginx/
      cp -r "$SOURCES/docker/seed/." /opt/dkpt/docker/seed/
      cp -r "$SOURCES/scripts/." /opt/dkpt/scripts/
      echo "✅ Files copied to /opt/dkpt/"
      ls -la /opt/dkpt/scripts/
    displayName: 'Prepare & copy infrastructure files'

  - script: |
      export POSTGRES_DB="$(POSTGRES_DB)"
      export POSTGRES_USER="$(POSTGRES_USER)"
      export POSTGRES_PASSWORD="$(POSTGRES_PASSWORD)"
      export JWT_SECRET_KEY="$(JWT_SECRET_KEY)"
      export JWT_ISSUER="$(JWT_ISSUER)"
      export JWT_AUDIENCE="$(JWT_AUDIENCE)"
      export CORS_ORIGINS="$(CORS_ORIGINS)"
      export NUXT_PUBLIC_API_BASE="$(NUXT_PUBLIC_API_BASE)"
      export APPLICATIONINSIGHTS_CONNECTION_STRING="$(APPLICATIONINSIGHTS_CONNECTION_STRING)"
      bash /opt/dkpt/scripts/generate-env.sh
    displayName: 'Generate .env file'

  - script: bash /opt/dkpt/scripts/deploy.sh
    displayName: 'Deploy via docker compose'
