# ============================================
# DKPT — Azure DevOps : Template Build .NET
# ============================================
# Morceau réutilisable pour build & test du backend .NET 9
# Utilisé par : ci.yml, pr-check.yml
#
# Spécificité Azure DevOps : les templates permettent de
# factoriser les steps communes entre plusieurs pipelines.
# C'est l'équivalent des "reusable workflows" de GitHub Actions
# ou des "include:" de GitLab CI.
#
# Cache : NuGet packages et SonarCloud scanner
# (utile sur agents Microsoft-hosted, VM détruite après chaque run)
# ============================================

steps:
  - task: UseDotNet@2
    displayName: 'Setup .NET 9'
    inputs:
      version: '9.0.x'

  # Cache NuGet packages (clé basée sur les fichiers .csproj)
  - task: Cache@2
    displayName: 'Cache NuGet packages'
    inputs:
      key: 'nuget | "$(Agent.OS)" | backend/**/*.csproj'
      restoreKeys: |
        nuget | "$(Agent.OS)"
      path: '$(NUGET_PACKAGES)'
    env:
      NUGET_PACKAGES: $(Pipeline.Workspace)/.nuget/packages

  # Cache SonarCloud scanner
  - task: Cache@2
    displayName: 'Cache SonarCloud'
    inputs:
      key: 'sonar | "$(Agent.OS)"'
      path: '$(Pipeline.Workspace)/.sonar/cache'
    env:
      SONAR_USER_HOME: $(Pipeline.Workspace)/.sonar

  - script: dotnet restore
    displayName: 'Restore dependencies'
    workingDirectory: backend
    env:
      NUGET_PACKAGES: $(Pipeline.Workspace)/.nuget/packages

  - script: dotnet build --no-restore --configuration Release /p:TreatWarningsAsErrors=true
    displayName: 'Build backend'
    workingDirectory: backend

  - script: dotnet test --no-build --configuration Release --verbosity minimal --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"
    displayName: 'Run tests with coverage'
    workingDirectory: backend

  - task: PublishTestResults@2
    displayName: 'Publish Test Results'
    inputs:
      testResultsFormat: 'VSTest'
      testResultsFiles: '**/test-results.trx'
      failTaskOnFailedTests: true
    condition: always()

  - task: PublishCodeCoverageResults@2
    displayName: 'Publish Code Coverage'
    inputs:
      summaryFileLocation: '**/coverage.cobertura.xml'
    condition: always()
