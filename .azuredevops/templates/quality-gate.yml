# ============================================
# DKPT — Azure DevOps : Template Quality Gate
# ============================================
# Tests post-déploiement exécutés sur le VPS staging.
# Vérifie la performance, la sécurité et le fonctionnel
# de l'application après déploiement.
#
# Exécuté par l'agent d'environnement (directement sur le VPS).
# Portable : les mêmes outils (k6, ZAP, Playwright) seront
# réutilisés sur GitHub Actions, GitLab CI et Bitbucket.
#
# Utilisé par : cd-staging.yml
# ============================================

steps:
  # ============================================
  # k6 — Load Testing
  # ============================================
  - script: |
      echo "⚡ Checking k6 installation..."
      if ! command -v k6 &> /dev/null; then
        echo "⚡ Installing k6..."
        K6_VERSION="v0.56.0"
        curl -sL "https://github.com/grafana/k6/releases/download/${K6_VERSION}/k6-${K6_VERSION}-linux-arm64.tar.gz" \
          | sudo tar xz -C /usr/local/bin --strip-components=1
      fi
      k6 version
    displayName: 'Setup k6'

  - script: |
      SOURCES="$(System.DefaultWorkingDirectory)"
      if [ ! -f "$SOURCES/tests/load/smoke-test.js" ]; then
        SOURCES="$(Pipeline.Workspace)/s"
      fi
      echo "⚡ Running k6 smoke test..."
      k6 run "$SOURCES/tests/load/smoke-test.js" \
        --env BASE_URL=http://localhost \
        --env TEST_USER_EMAIL="$(TEST_USER_EMAIL)" \
        --env TEST_USER_PASSWORD="$(TEST_USER_PASSWORD)" \
        --summary-export=k6-summary.json \
        2>&1 | tee k6-output.txt
      echo "⚡ k6 smoke test completed"
    displayName: 'Load Test (k6)'

  - task: PublishPipelineArtifact@1
    displayName: 'Publish k6 Results'
    inputs:
      targetPath: 'k6-summary.json'
      artifactName: 'k6-results'
    condition: always()

  # ============================================
  # OWASP ZAP — Security Scanning (DAST)
  # ============================================
  - script: |
      echo "🛡️ Running OWASP ZAP baseline scan..."
      mkdir -p zap-reports
      docker run --rm --network host \
        -v $(pwd)/zap-reports:/zap/wrk:rw \
        ghcr.io/zaproxy/zaproxy:stable \
        zap-baseline.py \
          -t http://localhost \
          -r zap-baseline-report.html \
          -J zap-baseline-report.json \
          -I
      echo "🛡️ Baseline scan completed"
    displayName: 'Security Scan — Baseline (OWASP ZAP)'
    continueOnError: true

  - script: |
      echo "🛡️ Running OWASP ZAP API scan..."
      docker run --rm --network host \
        -v $(pwd)/zap-reports:/zap/wrk:rw \
        ghcr.io/zaproxy/zaproxy:stable \
        zap-api-scan.py \
          -t http://localhost/swagger/v1/swagger.json \
          -f openapi \
          -r zap-api-report.html \
          -J zap-api-report.json \
          -I
      echo "🛡️ API scan completed"
    displayName: 'Security Scan — API (OWASP ZAP)'
    continueOnError: true

  - task: PublishPipelineArtifact@1
    displayName: 'Publish ZAP Security Reports'
    inputs:
      targetPath: 'zap-reports'
      artifactName: 'zap-security-reports'
    condition: always()

  # ============================================
  # Playwright — E2E Functional Tests
  # ============================================
  - script: |
      SOURCES="$(System.DefaultWorkingDirectory)"
      if [ ! -d "$SOURCES/tests/e2e" ]; then
        SOURCES="$(Pipeline.Workspace)/s"
      fi
      echo "🧪 Installing Playwright..."
      cd "$SOURCES/tests/e2e"
      npm install --prefer-offline
      npx playwright install --with-deps chromium
    displayName: 'Setup Playwright'

  - script: |
      SOURCES="$(System.DefaultWorkingDirectory)"
      if [ ! -d "$SOURCES/tests/e2e" ]; then
        SOURCES="$(Pipeline.Workspace)/s"
      fi
      echo "🧪 Running Playwright E2E tests..."
      cd "$SOURCES/tests/e2e"
      npx playwright test
    displayName: 'Run Playwright E2E Tests'
    env:
      BASE_URL: 'http://localhost'
    continueOnError: true

  - task: PublishTestResults@2
    displayName: 'Publish Playwright Results'
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '**/tests/e2e/results.xml'
      testRunTitle: 'Playwright E2E Tests'
      failTaskOnFailedTests: false
    condition: always()

  - task: PublishPipelineArtifact@1
    displayName: 'Publish Playwright Report'
    inputs:
      targetPath: 'tests/e2e/playwright-report'
      artifactName: 'playwright-report'
    condition: always()
