# ============================================
# DKPT — Azure DevOps : Template Build Nuxt
# ============================================
# Morceau réutilisable pour build du frontend Nuxt 4
# Utilisé par : ci.yml, pr-check.yml
#
# Spécificité Azure DevOps : les templates permettent de
# factoriser les steps communes entre plusieurs pipelines.
# ============================================

steps:
  - task: NodeTool@0
    displayName: 'Setup Node.js 22'
    inputs:
      versionSpec: '22.x'

  - script: npm ci
    displayName: 'Install dependencies'
    workingDirectory: frontend

  - script: npm run lint
    displayName: 'Lint (ESLint)'
    workingDirectory: frontend

  - script: npm run typecheck
    displayName: 'Type Check (TypeScript)'
    workingDirectory: frontend
    continueOnError: true  # Informatif — ne bloque pas le pipeline

  - script: npm run build
    displayName: 'Build frontend'
    workingDirectory: frontend
