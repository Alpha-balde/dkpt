# ============================================
# DKPT — GitLab CI : Pipeline enfant CD Production
# ============================================
# Architecture : Build Once, Deploy Many (BODM)
# Pull l'image :sha-{CI_COMMIT_SHORT_SHA} construite par le CI
# (même image que celle déployée en staging), déploie en production,
# puis retag :latest.
# Aucun docker build ici — l'image vient du CI.
#
# Déclenché par l'orchestrateur parent sur la branche main
# Équivalent de : .github/workflows/cd-prod.yml
# ============================================

stages:
  - deploy
  - retag

variables:
  DOCKER_BACKEND_IMAGE: $DOCKERHUB_USERNAME/dkpt-backend
  DOCKER_FRONTEND_IMAGE: $DOCKERHUB_USERNAME/dkpt-frontend

# ============================================
# Job 1 — Deploy to Production VPS (manuel)
# ============================================
deploy-production:
  stage: deploy
  image: alpine:latest
  environment:
    name: production
    url: https://dkpt.soguimod.com
  when: manual
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$VPS_SSH_KEY" | tr -d '\r' > /tmp/ssh_key
    - chmod 600 /tmp/ssh_key
    - ssh-add /tmp/ssh_key
    - rm /tmp/ssh_key
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts
  script:
    - echo "🚀 Deploying sha-${CI_COMMIT_SHORT_SHA} to production..."
    # Prepare VPS directory
    - ssh $VPS_USER@$VPS_HOST "sudo mkdir -p /opt/dkpt/caddy /opt/dkpt/docker/seed && sudo rm -rf /opt/dkpt/nginx && sudo chown -R \$(whoami):\$(whoami) /opt/dkpt"
    # Copy infrastructure files
    - scp docker-compose.prod.yml $VPS_USER@$VPS_HOST:/opt/dkpt/
    - scp -r caddy/ $VPS_USER@$VPS_HOST:/opt/dkpt/
    - scp -r docker/ $VPS_USER@$VPS_HOST:/opt/dkpt/
    - scp -r scripts/ $VPS_USER@$VPS_HOST:/opt/dkpt/
    # Generate .env with IMAGE_TAG=sha-$CI_COMMIT_SHORT_SHA (BODM — même image que staging)
    - ssh $VPS_USER@$VPS_HOST "POSTGRES_DB='$POSTGRES_DB' POSTGRES_USER='$POSTGRES_USER' POSTGRES_PASSWORD='$POSTGRES_PASSWORD' JWT_SECRET_KEY='$JWT_SECRET_KEY' JWT_ISSUER='$JWT_ISSUER' JWT_AUDIENCE='$JWT_AUDIENCE' CORS_ORIGINS='$CORS_ORIGINS' NUXT_PUBLIC_API_BASE='$NUXT_PUBLIC_API_BASE' SITE_ADDRESS='$SITE_ADDRESS' APPLICATIONINSIGHTS_CONNECTION_STRING='$APPLICATIONINSIGHTS_CONNECTION_STRING' IMAGE_TAG=sha-${CI_COMMIT_SHORT_SHA} bash /opt/dkpt/scripts/generate-env.sh"
    # Deploy (docker compose pull :sha + up)
    - ssh $VPS_USER@$VPS_HOST "bash /opt/dkpt/scripts/deploy.sh"
    - echo "✅ Production deployed with image sha-${CI_COMMIT_SHORT_SHA}"

# ============================================
# Job 2 — Retag :latest (BODM — promote sha image)
# ============================================
retag-latest:
  stage: retag
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  needs: [deploy-production]
  before_script:
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
  script:
    - echo "🏷️ Retagging sha-${CI_COMMIT_SHORT_SHA} → :latest"
    # Backend
    - docker pull $DOCKER_BACKEND_IMAGE:sha-${CI_COMMIT_SHORT_SHA}
    - docker tag $DOCKER_BACKEND_IMAGE:sha-${CI_COMMIT_SHORT_SHA} $DOCKER_BACKEND_IMAGE:latest
    - docker push $DOCKER_BACKEND_IMAGE:latest
    # Frontend
    - docker pull $DOCKER_FRONTEND_IMAGE:sha-${CI_COMMIT_SHORT_SHA}
    - docker tag $DOCKER_FRONTEND_IMAGE:sha-${CI_COMMIT_SHORT_SHA} $DOCKER_FRONTEND_IMAGE:latest
    - docker push $DOCKER_FRONTEND_IMAGE:latest
    - echo "✅ sha-${CI_COMMIT_SHORT_SHA} promoted to :latest"
