# ============================================
# DKPT — GitLab CI : Pipeline enfant CD Staging
# ============================================
# Docker build & push (tag :staging) + deploy sur VPS staging
# Déclenché par l'orchestrateur parent sur la branche develop
#
# Équivalent de : .github/workflows/cd-staging.yml
# ============================================

stages:
  - docker
  - deploy

variables:
  DOCKER_BACKEND_IMAGE: $DOCKERHUB_USERNAME/dkpt-backend
  DOCKER_FRONTEND_IMAGE: $DOCKERHUB_USERNAME/dkpt-frontend

# ============================================
# Job 1 — Docker Build & Push (tag :staging)
# ============================================
docker-build-push:
  stage: docker
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
  script:
    # Backend
    - docker build -t $DOCKER_BACKEND_IMAGE:staging -t $DOCKER_BACKEND_IMAGE:staging-$CI_COMMIT_SHORT_SHA ./backend
    - docker push $DOCKER_BACKEND_IMAGE:staging
    - docker push $DOCKER_BACKEND_IMAGE:staging-$CI_COMMIT_SHORT_SHA
    # Frontend
    - docker build -t $DOCKER_FRONTEND_IMAGE:staging -t $DOCKER_FRONTEND_IMAGE:staging-$CI_COMMIT_SHORT_SHA ./frontend
    - docker push $DOCKER_FRONTEND_IMAGE:staging
    - docker push $DOCKER_FRONTEND_IMAGE:staging-$CI_COMMIT_SHORT_SHA

# ============================================
# Job 2 — Deploy to Staging VPS
# ============================================
deploy-staging:
  stage: deploy
  image: alpine:latest
  environment:
    name: staging
    url: https://staging.dkpt.example.com
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$VPS_STAGING_SSH_KEY" | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H $VPS_STAGING_HOST >> ~/.ssh/known_hosts
  script:
    # Préparer le dossier de déploiement
    - ssh $VPS_STAGING_USER@$VPS_STAGING_HOST "sudo mkdir -p /opt/dkpt/caddy && sudo rm -rf /opt/dkpt/nginx && sudo chown -R \$(whoami):\$(whoami) /opt/dkpt"
    # Copier les fichiers d'infrastructure sur le VPS
    - scp docker-compose.prod.yml $VPS_STAGING_USER@$VPS_STAGING_HOST:/opt/dkpt/
    - scp -r caddy/ $VPS_STAGING_USER@$VPS_STAGING_HOST:/opt/dkpt/
    - scp -r docker/ $VPS_STAGING_USER@$VPS_STAGING_HOST:/opt/dkpt/
    # Déployer
    - ssh $VPS_STAGING_USER@$VPS_STAGING_HOST "
        cd /opt/dkpt &&
        docker compose -f docker-compose.prod.yml pull &&
        docker compose -f docker-compose.prod.yml up -d --remove-orphans &&
        echo '🌱 Running database seed (idempotent)...' &&
        docker compose -f docker-compose.prod.yml --profile seed up seed &&
        docker image prune -f &&
        echo '✅ Staging deploy complete!'"
