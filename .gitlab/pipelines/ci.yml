# ============================================
# DKPT — GitLab CI : Pipeline enfant CI
# ============================================
# Architecture : Build Once, Deploy Many (BODM)
# Ce pipeline CI construit et pousse l'image Docker une seule fois
# avec le tag :sha-{CI_COMMIT_SHORT_SHA}.
# Les pipelines CD (cd-staging, cd-prod) pull cette image — pas de rebuild.
#
# Équivalent de : .github/workflows/ci.yml
# ============================================

stages:
  - build-test
  - docker

variables:
  DOTNET_VERSION: "9.0"
  NODE_VERSION: "22"
  DOCKER_BACKEND_IMAGE: $DOCKERHUB_USERNAME/dkpt-backend
  DOCKER_FRONTEND_IMAGE: $DOCKERHUB_USERNAME/dkpt-frontend

# ============================================
# Job 1 — Backend Build & Test
# ============================================
backend-build-test:
  stage: build-test
  image: mcr.microsoft.com/dotnet/sdk:9.0
  script:
    - cd backend
    - dotnet restore
    - dotnet build --no-restore --configuration Release
    - dotnet test --no-build --configuration Release --verbosity minimal
  cache:
    key: dotnet-${CI_COMMIT_REF_SLUG}
    paths:
      - backend/**/bin/
      - backend/**/obj/

# ============================================
# Job 2 — Frontend Lint & Build
# ============================================
frontend-lint-build:
  stage: build-test
  image: node:22-alpine
  script:
    - cd frontend
    - npm ci --cache .npm
    - npm run lint
    - npm run build
  cache:
    key: node-${CI_COMMIT_REF_SLUG}
    paths:
      - frontend/.npm/
      - frontend/node_modules/

# ============================================
# Job 3 — Docker Build & Push (:sha-xxxxx)
# ============================================
# BUILD ONCE — tag :sha-{CI_COMMIT_SHORT_SHA}
# Les pipelines CD récupèrent cette image sans la reconstruire.
docker-build-sha:
  stage: docker
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    # Cross-compilation ARM64 depuis runner AMD64
    # Nécessaire car les VPS cibles sont linux/arm64
    # (équivalent du runner ubuntu-24.04-arm de GitHub Actions)
    TARGET_PLATFORM: "linux/arm64"
  before_script:
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
    # Activer QEMU pour cross-compilation ARM64
    - docker run --privileged --rm tonistiigi/binfmt --install arm64
    - docker buildx create --use --name builder
    - docker buildx inspect --bootstrap
  script:
    - echo "🐳 Building images (${TARGET_PLATFORM}) with tag sha-${CI_COMMIT_SHORT_SHA}"
    # Backend — cross-compilation arm64 + --push direct (buildx ne supporte pas docker load + push séparé)
    - docker buildx build
        --platform ${TARGET_PLATFORM}
        --network host
        --push
        -t $DOCKER_BACKEND_IMAGE:sha-${CI_COMMIT_SHORT_SHA}
        ./backend
    # Frontend — idem
    - docker buildx build
        --platform ${TARGET_PLATFORM}
        --network host
        --push
        -t $DOCKER_FRONTEND_IMAGE:sha-${CI_COMMIT_SHORT_SHA}
        ./frontend
    - echo "✅ ARM64 images pushed with tag sha-${CI_COMMIT_SHORT_SHA}"
