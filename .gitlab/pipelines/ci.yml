# ============================================
# DKPT — GitLab CI : Pipeline enfant CI
# ============================================
# Architecture : Build Once, Deploy Many (BODM)
# Ce pipeline CI construit et pousse l'image Docker une seule fois
# avec le tag :sha-{CI_COMMIT_SHORT_SHA}.
# Les pipelines CD (cd-staging, cd-prod) pull cette image — pas de rebuild.
#
# Runner : VPS Staging ARM64 self-hosted (tag: unbuntu_arm64)
# → Build natif linux/arm64, pas de QEMU nécessaire
# Équivalent de : .github/workflows/ci.yml (runner ubuntu-24.04-arm)
# ============================================

stages:
  - build-test
  - docker

variables:
  DOTNET_VERSION: "9.0"
  NODE_VERSION: "22"
  DOCKER_BACKEND_IMAGE: $DOCKERHUB_USERNAME/dkpt-backend
  DOCKER_FRONTEND_IMAGE: $DOCKERHUB_USERNAME/dkpt-frontend

# ============================================
# Job 1 — Backend Build & Test
# ============================================
backend-build-test:
  stage: build-test
  tags:
    - unbuntu_arm64
  image: mcr.microsoft.com/dotnet/sdk:9.0
  script:
    - cd backend
    - dotnet restore
    - dotnet build --no-restore --configuration Release
    - dotnet test --no-build --configuration Release --verbosity minimal
  cache:
    key: dotnet-${CI_COMMIT_REF_SLUG}
    paths:
      - backend/**/bin/
      - backend/**/obj/

# ============================================
# Job 2 — Frontend Lint & Build
# ============================================
frontend-lint-build:
  stage: build-test
  tags:
    - unbuntu_arm64
  image: node:22-alpine
  script:
    - cd frontend
    - npm ci --cache .npm
    - npm run lint
    - npm run build
  cache:
    key: node-${CI_COMMIT_REF_SLUG}
    paths:
      - frontend/.npm/
      - frontend/node_modules/

# ============================================
# Job 3 — Docker Build & Push (:sha-xxxxx)
# ============================================
# BUILD ONCE — tag :sha-{CI_COMMIT_SHORT_SHA}
# Runner self-hosted ARM64 → build natif linux/arm64 (pas de QEMU)
# Équivalent du runner ubuntu-24.04-arm de GitHub Actions
docker-build-sha:
  stage: docker
  tags:
    - unbuntu_arm64
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
  script:
    - echo "🐳 Building linux/arm64 images (native) with tag sha-${CI_COMMIT_SHORT_SHA}"
    # Backend — build natif ARM64 (runner self-hosted VPS staging)
    - docker build --network host -t $DOCKER_BACKEND_IMAGE:sha-${CI_COMMIT_SHORT_SHA} ./backend
    - docker push $DOCKER_BACKEND_IMAGE:sha-${CI_COMMIT_SHORT_SHA}
    # Frontend
    - docker build --network host -t $DOCKER_FRONTEND_IMAGE:sha-${CI_COMMIT_SHORT_SHA} ./frontend
    - docker push $DOCKER_FRONTEND_IMAGE:sha-${CI_COMMIT_SHORT_SHA}
    - echo "✅ Native ARM64 images pushed with tag sha-${CI_COMMIT_SHORT_SHA}"
